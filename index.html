<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>ChargeControl</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>ChargeControl Dashboard</h1>
        </header>
        <section id="status">
            <h2>Charging Status</h2>
            <p id="chargingStatus">Loading...</p>
        </section>
        <section id="modes">
            <h2>Charging Modes</h2>
            <p id="chargingModes">Loading...</p>
        </section>
        <section id="statistics">
            <h2>Statistics</h2>
            <p id="chargingStatistics">Loading...</p>
        </section>
        <section id="temperature">
            <h2>Temperature Monitoring</h2>
            <p id="temperatureMonitoring">Loading...</p>
        </section>
        <section id="ai-predictions">
            <h2>AI Predictions</h2>
            <p id="aiPredictions">Loading...</p>
        </section>
        <section id="protocol-recognition">
            <h2>Protocol Recognition</h2>
            <p id="protocolRecognition">Loading...</p>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
