name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors

      - name: Get version info
        id: info
        run: |
          # Use the manually supplied tag when triggered via workflow_dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.release_tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION_CLEAN="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_clean=${VERSION_CLEAN}" >> "$GITHUB_OUTPUT"
          echo "zip_name=ChargeControl_${VERSION}.zip" >> "$GITHUB_OUTPUT"

      - name: Update module.prop version
        run: |
          VERSION_CLEAN="${{ steps.info.outputs.version_clean }}"
          # Derive versionCode from semver (e.g. 1.2.3 → 10203)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION_CLEAN"
          CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
          sed -i "s/^version=.*/version=v${VERSION_CLEAN}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${CODE}/" module.prop
          cat module.prop

      - name: Build ZIP
        run: bash build.sh

      - name: Generate changelog
        id: changelog
        run: |
          # Extract commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.info.outputs.version }}
          name: ChargeControl ${{ steps.info.outputs.version }}
          body: |
            ## ChargeControl ${{ steps.info.outputs.version }}

            ### What's Changed
            ${{ steps.changelog.outputs.notes }}

            ### Installation
            1. Download `ChargeControl_${{ steps.info.outputs.version }}.zip`
            2. Open **KernelSU Manager** → Modules → Install from storage
            3. Select the downloaded ZIP and reboot

            ### Web UI
            After installation, access the dashboard at `http://<device-ip>:8080`
          files: out/ChargeControl_${{ steps.info.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(steps.info.outputs.version, '-') }}

      - name: Update update.json for KernelSU remote update
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          VERSION_CODE=$(grep '^versionCode=' module.prop | cut -d= -f2)
          ZIP_URL="https://github.com/ce11kjw/ChargeControl/releases/download/${VERSION}/ChargeControl_${VERSION}.zip"
          CHANGELOG_URL="https://github.com/ce11kjw/ChargeControl/releases/tag/${VERSION}"

          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "versionCode": ${VERSION_CODE},
            "zipUrl": "${ZIP_URL}",
            "changelog": "${CHANGELOG_URL}"
          }
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          git add update.json
          git commit -m "chore: update update.json to ${VERSION} [skip ci]"
          git push origin main
