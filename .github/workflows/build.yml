name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8

      - name: Lint with flake8
        run: |
          flake8 charge_control.py stats.py \
            --max-line-length=120 \
            --extend-ignore=E501

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask flask-cors pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || \
          python -c "
          import charge_control, stats, json, os
          # Basic smoke tests
          cfg = charge_control.load_config()
          assert isinstance(cfg, dict), 'load_config should return a dict'
          batt = charge_control.get_battery_status()
          assert 'capacity' in batt
          assert 'temperature' in batt
          stats.init_db()
          snaps = stats.get_recent_snapshots(10)
          assert isinstance(snaps, list)
          daily = stats.get_daily_stats(7)
          assert isinstance(daily, list)
          print('All smoke tests passed')
          "

  build-android:
    name: Build Android Binary (aarch64, API 35)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-python, test-python]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27c
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Build charge_control (aarch64, API 35)
        run: make NDK="$NDK_PATH" API=35

      - name: Verify binary is Android ELF aarch64
        run: |
          file charge_control | grep -E 'ELF 64-bit.*aarch64' || \
            { echo "ERROR: Not an aarch64 ELF binary"; exit 1; }
          echo "Binary OK ✓"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: charge_control-android-aarch64-api35
          path: charge_control
          retention-days: 30

  build-zip:
    name: Build Module ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build-android]
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27c
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018"
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Build charge_control (aarch64, API 35)
        run: make NDK="$NDK_PATH" API=35

      - name: Build ZIP
        run: SKIP_COMPILE=1 bash build.sh

      - name: Verify ZIP contains charge_control binary
        run: |
          ZIP=$(ls out/ChargeControl_*.zip | head -1)
          echo "Checking $ZIP …"
          unzip -l "$ZIP" | grep 'charge_control$' || { echo 'ERROR: charge_control binary missing from ZIP'; exit 1; }
          echo "charge_control found in ZIP ✓"

      - name: Get version
        id: version
        run: echo "version=$(grep '^version=' module.prop | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChargeControl-${{ steps.version.outputs.version }}
          path: out/*.zip
          retention-days: 30
