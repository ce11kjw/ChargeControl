name: Build and Upload to Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build Module ZIP and Upload to Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build ZIP
        run: bash build.sh

      - name: Get module version
        id: version
        run: |
          VERSION=$(grep '^version=' module.prop | cut -d= -f2)
          if [ -z "$VERSION" ]; then
            echo "Error: could not extract version from module.prop" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify build output
        run: |
          ZIP="out/ChargeControl_${{ steps.version.outputs.version }}.zip"
          if [ ! -f "$ZIP" ]; then
            echo "Error: expected ZIP not found: $ZIP" >&2
            ls -la out/ || true
            exit 1
          fi
          echo "ZIP verified: $ZIP ($(du -sh "$ZIP" | cut -f1))"

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ChargeControl ${{ github.event.inputs.release_tag }}
          body: |
            ## ChargeControl ${{ github.event.inputs.release_tag }}

            ### Installation
            1. Download `ChargeControl_${{ steps.version.outputs.version }}.zip`
            2. Open **KernelSU Manager** → Modules → Install from storage
            3. Select the downloaded ZIP and reboot

            ### Web UI
            After installation, access the dashboard at `http://<device-ip>:8080`
          files: out/ChargeControl_${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
