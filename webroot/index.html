<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>充电控制 仪表盘</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── 导航栏 ───────────────────────────────────────── -->
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">⚡</span>
      <span class="nav-title">充电控制</span>
    </div>
    <div class="nav-actions">
      <button id="themeToggle" class="btn btn-icon" title="切换主题">🌙</button>
      <span id="connectionStatus" class="badge badge-success">已连接</span>
    </div>
  </nav>

  <main class="layout">
    <!-- ── 侧边栏 ──────────────────────────────────────────── -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" data-tab="dashboard">📊 仪表盘</a>
        <a href="#" class="sidebar-link" data-tab="control">🎛️ 控制</a>
        <a href="#" class="sidebar-link" data-tab="modes">⚡ 模式</a>
        <a href="#" class="sidebar-link" data-tab="stats">📈 统计</a>
        <a href="#" class="sidebar-link" data-tab="config">⚙️ 设置</a>
      </nav>
    </aside>

    <!-- ── 主内容区 ──────────────────────────────────────── -->
    <div class="content">

      <!-- ═══════════════════ 仪表盘标签页 ═══════════════════ -->
      <section class="tab-panel active" id="tab-dashboard">
        <h2 class="section-title">仪表盘</h2>

        <!-- 状态卡片 -->
        <div class="card-grid">
          <div class="card card--accent">
            <div class="card-label">电池电量</div>
            <div class="card-value" id="batteryLevel">—</div>
            <div class="battery-bar-wrap">
              <div class="battery-bar" id="batteryBar"></div>
            </div>
          </div>
          <div class="card">
            <div class="card-label">充电状态</div>
            <div class="card-value" id="chargingStatus">—</div>
          </div>
          <div class="card">
            <div class="card-label">温度</div>
            <div class="card-value" id="batteryTemp">—</div>
          </div>
          <div class="card">
            <div class="card-label">当前模式</div>
            <div class="card-value" id="currentMode">—</div>
          </div>
          <div class="card">
            <div class="card-label">电压</div>
            <div class="card-value" id="batteryVoltage">—</div>
          </div>
          <div class="card">
            <div class="card-label">电流</div>
            <div class="card-value" id="batteryCurrent">—</div>
          </div>
        </div>

        <!-- 温度趋势图（最近60次快照） -->
        <div class="card card--full">
          <div class="card-header">
            <span>温度历史记录</span>
            <button class="btn btn-sm" id="refreshChart">↺ 刷新</button>
          </div>
          <canvas id="tempChart" height="140"></canvas>
        </div>

        <!-- 电池健康度 -->
        <div class="card card--full" id="healthCard">
          <div class="card-label">电池健康评分</div>
          <div class="card-value" id="healthScore">—</div>
          <p class="card-sub" id="healthDetail"></p>
        </div>
      </section>

      <!-- ═══════════════════ 控制标签页 ═══════════════════ -->
      <section class="tab-panel" id="tab-control">
        <h2 class="section-title">充电控制</h2>

        <!-- 启用 / 禁用 -->
        <div class="card">
          <div class="card-header">充电开关</div>
          <label class="toggle-wrap">
            <span>启用充电</span>
            <div class="toggle">
              <input type="checkbox" id="chargingToggle" checked />
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>

        <!-- 充电上限滑块 -->
        <div class="card">
          <div class="card-header">最大充电上限</div>
          <div class="slider-row">
            <input type="range" id="chargeLimitSlider" min="20" max="100" value="80" />
            <span class="slider-value" id="chargeLimitValue">80%</span>
          </div>
          <p class="card-sub">电量达到此值时将停止充电。</p>
          <button class="btn btn-primary" id="applyLimitBtn">应用上限</button>
        </div>

        <!-- 温度阈值 -->
        <div class="card">
          <div class="card-header">温度阈值</div>
          <div class="slider-row">
            <input type="range" id="tempThresholdSlider" min="30" max="50" value="40" />
            <span class="slider-value" id="tempThresholdValue">40°C</span>
          </div>
          <div class="slider-row">
            <label>临界温度：</label>
            <input type="range" id="tempCriticalSlider" min="35" max="55" value="45" />
            <span class="slider-value" id="tempCriticalValue">45°C</span>
          </div>
          <button class="btn btn-primary" id="applyTempBtn">应用阈值</button>
        </div>

        <!-- 温度保护 -->
        <div class="card">
          <div class="card-header">温度保护</div>
          <p class="card-sub">手动触发温度检测。</p>
          <button class="btn btn-warning" id="tempCheckBtn">执行温度检测</button>
          <div id="tempCheckResult" class="result-box hidden"></div>
        </div>
      </section>

      <!-- ═══════════════════ 模式标签页 ═══════════════════ -->
      <section class="tab-panel" id="tab-modes">
        <h2 class="section-title">充电模式</h2>
        <div class="modes-grid" id="modesGrid">
          <!-- 由 JS 动态填充 -->
        </div>
        <div id="modeSetResult" class="result-box hidden"></div>
      </section>

      <!-- ═══════════════════ 统计标签页 ═══════════════════ -->
      <section class="tab-panel" id="tab-stats">
        <h2 class="section-title">充电统计</h2>

        <div class="tab-sub-nav">
          <button class="btn btn-sm active" data-period="daily">每日（7天）</button>
          <button class="btn btn-sm" data-period="weekly">每周</button>
          <button class="btn btn-sm" data-period="monthly">每月</button>
        </div>

        <canvas id="statsChart" height="180"></canvas>

        <div class="card card--full">
          <div class="card-header">
            <span>充电会话数据</span>
            <div class="export-btns">
              <button class="btn btn-sm" id="exportCsv">⬇ CSV</button>
              <button class="btn btn-sm" id="exportJson">⬇ JSON</button>
            </div>
          </div>
          <div class="table-wrap">
            <table id="statsTable">
              <thead id="statsTableHead"></thead>
              <tbody id="statsTableBody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- ═══════════════════ 设置标签页 ═══════════════════ -->
      <section class="tab-panel" id="tab-config">
        <h2 class="section-title">设置</h2>

        <div class="card card--full">
          <div class="card-header">
            <span>配置文件（JSON）</span>
            <div>
              <button class="btn btn-sm" id="loadConfigBtn">加载</button>
              <button class="btn btn-primary btn-sm" id="saveConfigBtn">保存</button>
            </div>
          </div>
          <textarea id="configEditor" class="config-editor" spellcheck="false"></textarea>
          <div id="configResult" class="result-box hidden"></div>
        </div>

        <!-- 快捷预设 -->
        <div class="card card--full">
          <div class="card-header">快捷预设</div>
          <div class="presets-grid">
            <button class="btn preset-btn" data-preset="night">🌙 夜间（涓流 80%）</button>
            <button class="btn preset-btn" data-preset="work">💼 办公（普通 90%）</button>
            <button class="btn preset-btn" data-preset="travel">✈️ 出行（快充 100%）</button>
            <button class="btn preset-btn" data-preset="save">🌿 省电（涓流 60%）</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- 弹出通知 -->
  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>
</body>
</html>
